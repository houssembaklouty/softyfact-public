# ============================================
# app.softyfact.tn — Nginx Virtual Host
# Core ERP application (auth, dashboard, admin)
# ============================================
# Install: sudo cp deploy/nginx/app.softyfact.tn.conf /etc/nginx/sites-available/app.softyfact.tn
#          sudo ln -s /etc/nginx/sites-available/app.softyfact.tn /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name app.softyfact.tn;
    return 301 https://$host$request_uri;
}

# HTTPS — Core ERP app
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.softyfact.tn;

    # ── SSL (Let's Encrypt / Certbot) ──
    ssl_certificate     /etc/letsencrypt/live/app.softyfact.tn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.softyfact.tn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Document Root ──
    root /var/www/fetora-pro/public;
    index index.php;

    # ── Security Headers ──
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Limits ──
    client_max_body_size 50M;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ── Block dotfiles ──
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Static assets ──
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── PHP handling (only index.php) ──
    location ~ \.php$ {
        location ~ ^/index\.php$ {
            fastcgi_pass unix:/run/php/php8.3-fpm-fetora-pro.sock;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_read_timeout 120;
            fastcgi_buffering on;
            fastcgi_buffer_size 32k;
            fastcgi_buffers 16 32k;
        }
        return 404;
    }

    # ── Laravel routing ──
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Storage symlink ──
    location /storage {
        alias /var/www/fetora-pro/storage/app/public;
        access_log off;
    }

    # ── Logs ──
    access_log /var/log/nginx/fetora-pro.access.log;
    error_log  /var/log/nginx/fetora-pro.error.log;
}
