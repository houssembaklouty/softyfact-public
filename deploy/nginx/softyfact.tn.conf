# ============================================
# softyfact.tn — Nginx Virtual Host
# Public website (landing, products, orders)
# ============================================
# Install: sudo cp deploy/nginx/softyfact.tn.conf /etc/nginx/sites-available/softyfact.tn
#          sudo ln -s /etc/nginx/sites-available/softyfact.tn /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

# Redirect www → non-www
server {
    listen 80;
    listen [::]:80;
    server_name www.softyfact.tn;
    return 301 https://softyfact.tn$request_uri;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name softyfact.tn;
    return 301 https://$host$request_uri;
}

# HTTPS — Main public site
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name softyfact.tn;

    # ── SSL (Let's Encrypt / Certbot) ──
    ssl_certificate     /etc/letsencrypt/live/softyfact.tn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/softyfact.tn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Document Root ──
    root /var/www/softyfact-public/public;
    index index.php;

    # ── Security Headers ──
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Limits ──
    client_max_body_size 10M;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ── Block dotfiles ──
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Static assets (long cache) ──
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── PHP handling (only index.php) ──
    location ~ \.php$ {
        # Block all PHP except index.php
        location ~ ^/index\.php$ {
            fastcgi_pass unix:/run/php/php8.3-fpm-softyfact-public.sock;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_read_timeout 30;
            fastcgi_buffering on;
            fastcgi_buffer_size 16k;
            fastcgi_buffers 8 16k;
        }
        return 404;
    }

    # ── Laravel routing ──
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Logs ──
    access_log /var/log/nginx/softyfact-public.access.log;
    error_log  /var/log/nginx/softyfact-public.error.log;
}
