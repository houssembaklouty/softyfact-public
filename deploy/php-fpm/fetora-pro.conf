; ============================================
; PHP-FPM Pool — fetora-pro
; Core ERP application (heavier workloads)
; ============================================
; Install: sudo cp deploy/php-fpm/fetora-pro.conf /etc/php/8.3/fpm/pool.d/
;          sudo systemctl restart php8.3-fpm

[fetora-pro]
user = www-data
group = www-data

listen = /run/php/php8.3-fpm-fetora-pro.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; ── Process Management ──
pm = dynamic
pm.max_children = 30
pm.start_servers = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 10
pm.max_requests = 500

; ── Timeouts ──
request_terminate_timeout = 120s

; ── Environment ──
env[APP_ENV] = production

; ── Logs ──
php_admin_value[error_log] = /var/log/php-fpm/fetora-pro-error.log
php_admin_flag[log_errors] = on
php_admin_value[display_errors] = off

; ── Security ──
php_admin_value[open_basedir] = /var/www/fetora-pro/:/tmp/:/var/log/php-fpm/
php_admin_value[expose_php] = off

; ── Limits ──
php_admin_value[memory_limit] = 512M
php_admin_value[post_max_size] = 50M
php_admin_value[upload_max_filesize] = 50M
php_admin_value[max_execution_time] = 120
