; ============================================
; PHP-FPM Pool — softyfact-public
; Public website (low traffic, lightweight)
; ============================================
; Install: sudo cp deploy/php-fpm/softyfact-public.conf /etc/php/8.3/fpm/pool.d/
;          sudo systemctl restart php8.3-fpm

[softyfact-public]
user = www-data
group = www-data

listen = /run/php/php8.3-fpm-softyfact-public.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; ── Process Management ──
pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests = 500

; ── Timeouts ──
request_terminate_timeout = 30s

; ── Environment ──
env[APP_ENV] = production

; ── Logs ──
php_admin_value[error_log] = /var/log/php-fpm/softyfact-public-error.log
php_admin_flag[log_errors] = on
php_admin_value[display_errors] = off

; ── Security ──
php_admin_value[open_basedir] = /var/www/softyfact-public/:/tmp/:/var/log/php-fpm/
php_admin_value[disable_functions] = exec,passthru,shell_exec,system,proc_open,popen
php_admin_value[allow_url_fopen] = off
php_admin_value[expose_php] = off

; ── Limits ──
php_admin_value[memory_limit] = 128M
php_admin_value[post_max_size] = 10M
php_admin_value[upload_max_filesize] = 10M
