services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: softyfact-public
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_PORT:-8083}:80"
    environment:
      APP_NAME: ${APP_NAME:-SoftyFact}
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8081}
      CORE_APP_URL: ${CORE_APP_URL:-https://app.softyfact.tn}
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/storage/app/database.sqlite
      SESSION_DRIVER: file
      SESSION_LIFETIME: 120
      CACHE_STORE: file
      LOG_CHANNEL: stack
      APP_SUPPORT_PHONE: ${APP_SUPPORT_PHONE:-20 439 475}
      APP_ORDER_AMOUNT: ${APP_ORDER_AMOUNT:-119}
      APP_ORDER_AMOUNT_ONLINE: ${APP_ORDER_AMOUNT_ONLINE:-119}
      PUBLIC_SITE_API_KEY: ${PUBLIC_SITE_API_KEY:-}
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@softyfact.tn}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-SoftyFact}
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - softyfact

volumes:
  app-storage:

networks:
  softyfact:
    driver: bridge
