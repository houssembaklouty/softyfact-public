services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: softyfact-public
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_PORT:-8081}:80"
    environment:
      APP_NAME: ${APP_NAME:-SoftyFact}
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8081}
      CORE_APP_URL: ${CORE_APP_URL:-https://app.softyfact.tn}
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/storage/app/database.sqlite
      SESSION_DRIVER: file
      SESSION_LIFETIME: 120
      CACHE_STORE: file
      LOG_CHANNEL: stack
      APP_SUPPORT_PHONE: ${APP_SUPPORT_PHONE:-71 000 000}
      APP_ORDER_AMOUNT: ${APP_ORDER_AMOUNT:-149}
      APP_ORDER_AMOUNT_ONLINE: ${APP_ORDER_AMOUNT_ONLINE:-99}
      PUBLIC_SITE_API_KEY: ${PUBLIC_SITE_API_KEY:-}
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - softyfact

volumes:
  app-storage:

networks:
  softyfact:
    driver: bridge
